kind = "web"
previewPath = "/"
title = "Mega Bags"
version = "1.0.0"
id = "artifacts/megabags"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22610

[services.development]
run = "pnpm --filter @workspace/megabags run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/megabags", "run", "build" ]
publicDir = "artifacts/megabags/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22610"
BASE_PATH = "/"
